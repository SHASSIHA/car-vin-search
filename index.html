<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Search</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 10px; width: 300px; margin: 5px 0; }
img { width: 200px; margin: 5px; border-radius: 10px; }
</style>
</head>

<body>

<h2>Car VIN Search</h2>

<input id="vin" placeholder="Enter VIN">
<button onclick="searchVIN()">Search</button>

<h3>Vehicle Info</h3>
<div id="info"></div>

<h3>Images</h3>
<div id="images"></div>

<script>
async function searchVIN() {
    const vin = document.getElementById("vin").value;

    if (!vin) return alert("Enter VIN");

    document.getElementById("info").innerHTML = "Loading...";
    document.getElementById("images").innerHTML = "";

    // 1. Get car data (FREE API - NHTSA)
    const url = `https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValuesExtended/${vin}?format=json`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const car = data.Results[0];

        document.getElementById("info").innerHTML = `
            <p><b>Make:</b> ${car.Make}</p>
            <p><b>Model:</b> ${car.Model}</p>
            <p><b>Year:</b> ${car.ModelYear}</p>
            <p><b>Engine:</b> ${car.EngineModel || "N/A"}</p>
        `;

        // 2. Images (Google fallback search)
        const query = vin + " car accident auction";
        loadImages(query);

    } catch (e) {
        document.getElementById("info").innerHTML = "Error loading data";
    }
}

// simple image fetch using DuckDuckGo (works without API key)
async function loadImages(query) {
    const url = `https://duckduckgo.com/?q=${query}&iax=images&ia=images`;

    // workaround: use google image search redirect method
    const googleURL = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(query)}`;

    const imgDiv = document.getElementById("images");

    imgDiv.innerHTML = `
        <p>Click below to view images:</p>
        <a href="${googleURL}" target="_blank">Open Google Images</a>
    `;
}
</script>

</body>
</html>
