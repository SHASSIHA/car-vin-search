<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:#fff;
}

/* ===== LOGO HEADER ===== */
.header{
  text-align:center;
  padding:18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:22px;
  font-weight:bold;
}

/* ===== CARDS (مهم) ===== */
.card,
.search-box,
.result-card{
  max-width:500px;
  margin:15px auto;
  padding:15px;
  background: rgba(255,255,255,0.08);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

/* input */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  margin-top:10px;
}

/* button */
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* badge */
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 VIN Intelligence System</h2>

<input id="vin" placeholder="Enter VIN number">
<button onclick="searchVIN()">Search</button>

<div class="card" id="info">Waiting...</div>

<div class="card">
<h3>📸 Images</h3>
<div class="grid" id="images"></div>
</div>

</div>

<script>

// =========================
// CONFIG
// =========================
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxmRilWm4Y0WYU9EnTmafJ_7ci1EKMXQ3DTNUA749do_wLN7R3KtqqYzBdGbVO6aCy9/exec";

const API_KEY = ""; // Google CSE (اختياري)
const CX = "";      // اختياري

let currentVIN = "";

// =========================
// MAIN FUNCTION
// =========================
async function searchVIN(){

const vin = document.getElementById("vin").value;
if(!vin) return alert("Enter VIN");

currentVIN = vin;

document.getElementById("info").innerHTML = "Loading...";
document.getElementById("images").innerHTML = "";

// save to sheet instantly
saveToSheet(vin);

// get car data
try{

const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValuesExtended/${vin}?format=json`);
const data = await res.json();
const car = data.Results[0];

document.getElementById("info").innerHTML = `
<h3>اطلب ترير من شاصيها الان</h3>
<p><b>Make:</b> ${car.Make || "-"}</p>
<p><b>Model:</b> ${car.Model || "-"}</p>
<p><b>Year:</b> ${car.ModelYear || "-"}</p>
<p class="small">Source: NHTSA</p>
`;

loadImages(`${car.Make} ${car.Model} accident auction damage`);

}catch(e){
document.getElementById("info").innerHTML = "Error loading data";
}

}

// =========================
// SAVE TO GOOGLE SHEET
// =========================
async function saveToSheet(vin){

fetch(SHEET_URL,{
method:"POST",
body:JSON.stringify({
vin:vin,
source:"VIN_APP"
})
});

}

// =========================
// LOAD IMAGES
// =========================
async function loadImages(query){

const container = document.getElementById("images");

if(!API_KEY || !CX){
showWhatsApp();
return;
}

const url = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(query)}&cx=${CX}&key=${API_KEY}&searchType=image&num=6`;

try{

const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

if(data.items && data.items.length>0){

data.items.forEach(img=>{
const el = document.createElement("img");
el.src = img.link;
container.appendChild(el);
});

}else{
showWhatsApp();
}

}catch(e){
showWhatsApp();
}

}

// =========================
// WHATSAPP FALLBACK
// =========================
function showWhatsApp(){

document.getElementById("images").innerHTML = `
<p>📸 الصورمقفولة</p>
<button onclick="sendWhatsApp()">
طلب التقرير  <    
</button>
`;

}

// =========================
// WHATSAPP
// =========================
function sendWhatsApp(){

const phone = "9647812100701"; // غيّر رقمك

const msg = `السلام عليكم,اريد افحص سيارتي برقم الشاصي: ${currentVIN}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");

}

</script>

</body>
</html>
