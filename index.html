<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shassiha VIN Check</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* ===== BACKGROUND ===== */
body{
  background: linear-gradient(135deg, #7c2d12, #c2410c);
  min-height:100vh;
  display:flex;
  justify-content:center;
}

/* ===== APP CONTAINER ===== */
.app{
  width:100%;
  max-width:420px;
  background:#fff;
  min-height:100vh;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  background:#fff7ed;
  border-bottom:1px solid #ffe0c2;
}

/* 🔥 هذا الشكل الاحترافي الحقيقي */
.app-logo{
  height:46px;
  width:auto;
  max-width:180px;

  object-fit:contain;

  /* بدون خلفية نهائياً */
  background:transparent;
  padding:0;
  border-radius:0;

  /* ظل خفيف يعطيه فخامة مثل التطبيقات */
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));

  transition:0.3s;
}

.app-logo:hover{
  transform: scale(1.05);
}

/* ===== CONTENT ===== */
.container{
  padding:15px;
}

/* ===== CARD ===== */
.search-box,
.result-card{
  background:#ffffff;
  border-radius:16px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  border:1px solid #f1f1f1;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ea580c;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* BADGE */
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  background:#16a34a;
  color:#fff;
  font-weight:bold;
  margin-bottom:10px;
}

/* HIDDEN */
.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
   <img src="logo.png" class="app-logo">
  </div>

  <!-- CONTENT -->
  <div class="container">

    <!-- SEARCH -->
    <div class="search-box">
      <h3>فحص رقم الشاصي</h3>
      <input type="text" id="vinInput" placeholder="اكتب رقم VIN هنا">
      <button onclick="searchVIN()">بحث</button>
    </div>

    <!-- RESULT -->
    <div id="result" class="result-card hidden">
      <div class="badge">RESULT</div>
      <h3 id="carName">-</h3>
      <p id="carInfo">-</p>
    </div>

  </div>

</div>

<script>
function searchVIN(){
  let vin = document.getElementById("vinInput").value;

  if(vin.length < 5){
    alert("اكتب رقم VIN صحيح");
    return;
  }

  // بيانات تجريبية
  document.getElementById("carName").innerText = "Toyota Camry 2020";
  document.getElementById("carInfo").innerText = "Clean - No accidents - USA Import";

  document.getElementById("result").classList.remove("hidden");
}
</script>

</body>
</html>
