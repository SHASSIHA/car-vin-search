<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(135deg, #7c2d12, #c2410c);
  min-height:100vh;
  display:flex;
  justify-content:center;
}

/* ===== APP CONTAINER (شكل موبايل) ===== */
.app{
  width:100%;
  max-width:420px;
  background:#fff;
  min-height:100vh;
  margin:0 auto;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* ===== HEADER ===== */
.header{
  background:#fff7ed;
  padding:18px;
  text-align:center;
  border-bottom:1px solid #ffe0c2;
}
.footer{
  text-align:center;
  padding:15px;
  font-size:12px;
  color:#777;
  border-top:1px solid #eee;
  margin-top:20px;
}
.logo{
  width:140px;
  margin-top:20px;
}

/* ===== CONTENT ===== */
.container{
  padding:15px;
}

/* ===== CARD ===== */
.card,
.search-box,
.result-card{
  background:#ffffff;
  border-radius:16px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  border:1px solid #f1f1f1;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ea580c;
  color:#fff;
  font-weight:bold;
}

/* BADGE */
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  background:#16a34a;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>
  <img src="./logo.png" class="logo">
  <p class="subtitle">
  شاصيها | فحص سيارات
</p>
<div class="app">
<div class="container">

<h2>اطلب تقرير من شاصيها الان</h2>

<input id="vin" placeholder="Enter VIN number">
<button onclick="searchVIN()">Search</button>

<div class="card" id="info">Waiting...</div>

<div class="card">
<h3> Images</h3>
<div class="grid" id="images"></div>
</div>

</div>
</div>
<script>

// =========================
// CONFIG
// =========================
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxmRilWm4Y0WYU9EnTmafJ_7ci1EKMXQ3DTNUA749do_wLN7R3KtqqYzBdGbVO6aCy9/exec";

const API_KEY = ""; // Google CSE (اختياري)
const CX = "";      // اختياري

let currentVIN = "";

// =========================
// MAIN FUNCTION
// =========================
async function searchVIN(){

const vin = document.getElementById("vin").value;
if(!vin) return alert("Enter VIN");

currentVIN = vin;

document.getElementById("info").innerHTML = "Loading...";
document.getElementById("images").innerHTML = "";

// save to sheet instantly
saveToSheet(vin);

// get car data
try{

const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValuesExtended/${vin}?format=json`);
const data = await res.json();
const car = data.Results[0];

document.getElementById("info").innerHTML = `
<h3>معلومات سيارتك</h3>
<p><b>Make:</b> ${car.Make || "-"}</p>
<p><b>Model:</b> ${car.Model || "-"}</p>
<p><b>Year:</b> ${car.ModelYear || "-"}</p>
<p class="small">Source: NHTSA</p>
`;

loadImages(`${car.Make} ${car.Model} accident auction damage`);

}catch(e){
document.getElementById("info").innerHTML = "Error loading data";
}

}

// =========================
// SAVE TO GOOGLE SHEET
// =========================
async function saveToSheet(vin){

fetch(SHEET_URL,{
method:"POST",
body:JSON.stringify({
vin:vin,
source:"VIN_APP"
})
});

}

// =========================
// LOAD IMAGES
// =========================
async function loadImages(query){

const container = document.getElementById("images");

if(!API_KEY || !CX){
showWhatsApp();
return;
}

const url = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(query)}&cx=${CX}&key=${API_KEY}&searchType=image&num=6`;

try{

const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

if(data.items && data.items.length>0){

data.items.forEach(img=>{
const el = document.createElement("img");
el.src = img.link;
container.appendChild(el);
});

}else{
showWhatsApp();
}

}catch(e){
showWhatsApp();
}

}

// =========================
// WHATSAPP FALLBACK
// =========================
function showWhatsApp(){

document.getElementById("images").innerHTML = `
<p>📸 الصورمقفولة</p>
<button onclick="sendWhatsApp()">
اطلب التقرير الان !    
</button>
`;

}

// =========================
// WHATSAPP
// =========================
function sendWhatsApp(){

const phone = "9647812100701"; // غيّر رقمك

const msg = `السلام عليكم,اريد افحص سيارتي برقم الشاصي: ${currentVIN}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");

}

</script>
  
<footer style="
margin-top:40px;
padding:20px;
font-size:14px;
color:#6b7280;
text-align:center;
">

Powered by <b>SHASSIHA</b> © 2026

</footer>

</body>
</html>
