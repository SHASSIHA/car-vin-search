<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فحص رقم الشاصي | شاصيها</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:#fff;
  min-height:100vh;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

/* ===== MAIN CONTAINER ===== */
.container{
  max-width:600px;
  margin:30px auto;
  padding:15px;
}

/* ===== SEARCH BOX ===== */
.search-box{
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.search-box h3{
  margin-bottom:10px;
}

.search-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  margin-top:10px;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* ===== RESULT CARD ===== */
.result-card{
  margin-top:20px;
  padding:15px;
  background: rgba(255,255,255,0.08);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SHASSIHA VIN CHECK</div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- SEARCH -->
  <div class="search-box">
    <h3>فحص رقم الشاصي</h3>
    <input type="text" id="vinInput" placeholder="اكتب رقم VIN هنا">
    <button onclick="searchVIN()">بحث</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="result-card hidden">
    <div class="badge">RESULT</div>
    <h3 id="carName">-</h3>
    <p id="carInfo">-</p>
  </div>

</div>

<script>
function searchVIN(){
  let vin = document.getElementById("vinInput").value;

  if(vin.length < 5){
    alert("اكتب رقم VIN صحيح");
    return;
  }

  // مثال بيانات (تبدلها بالـ API مالك)
  document.getElementById("carName").innerText = "Toyota Camry 2020";
  document.getElementById("carInfo").innerText = "Clean - No accidents - USA Import";

  document.getElementById("result").classList.remove("hidden");
}
</script>

</body>
</html>
