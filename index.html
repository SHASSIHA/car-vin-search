<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(135deg, #7c2d12, #c2410c);
  min-height:100vh;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:420px;
  background:#fff;
  min-height:100vh;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  display:flex;
  flex-direction:column;
}

.header{
  background:#fff;
  text-align:center;
  padding:25px 15px 15px;
  border-bottom:1px solid #f1f1f1;
}

.logo{
  width:220px;
  max-width:90%;
  display:block;
  margin:auto;
}

.container{
  padding:15px;
  flex:1;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  border:1px solid #f1f1f1;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ea580c;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.grid img{
  width:100%;
  border-radius:10px;
}

.footer{
  margin-top:auto;
  text-align:center;
  padding:20px;
  color:#6b7280;
  font-size:14px;
  border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <img src="./logo.png" class="logo">
</div>

<div class="container">

<h2>اطلب تقرير من شاصيها الان</h2>

<input id="vin" placeholder="Enter VIN number">
<button id="searchBtn" onclick="searchVIN()">Search</button>
<button id="resetBtn" onclick="resetApp()" style="display:none;">
  بحث جديد
</button>
<div class="card" id="info">Waiting...</div>

<div class="card">
  <h3>Images</h3>
  <div class="grid" id="images"></div>
</div>

</div>

<div class="footer">
Powered by <b>SHASSIHA</b> © 2026
</div>

</div>

<script>

const SHEET_URL = "https://script.google.com/macros/s/AKfycbxmRilWm4Y0WYU9EnTmafJ_7ci1EKMXQ3DTNUA749do_wLN7R3KtqqYzBdGbVO6aCy9/exec";

const API_KEY = "";
const CX = "";

let currentVIN = "";

async function searchVIN(){

const vin = document.getElementById("vin").value;
if(!vin) return alert("Enter VIN");

currentVIN = vin;

// hide only search button (مو كل الأزرار)
document.getElementById("vin").style.display = "none";
document.getElementById("searchBtn").style.display = "none";

document.getElementById("info").innerHTML = "Loading...";
document.getElementById("images").innerHTML = "";
document.getElementById("resetBtn").style.display = "block";
saveToSheet(vin);

try{

const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValuesExtended/${vin}?format=json`);
const data = await res.json();
const car = data.Results[0];

document.getElementById("info").innerHTML = `
<h3>معلومات السيارة</h3>

<p><b>VIN:</b> ${vin}</p>
<p><b>Make:</b> ${car.Make || "-"}</p>
<p><b>Model:</b> ${car.Model || "-"}</p>
<p><b>Year:</b> ${car.ModelYear || "-"}</p>

`;

loadImages(`${car.Make} ${car.Model} accident damage auction`);

}catch(e){
document.getElementById("info").innerHTML = "Error loading data";
}

}

async function saveToSheet(vin){
fetch(SHEET_URL,{
method:"POST",
body:JSON.stringify({
vin:vin,
source:"VIN_APP"
})
});
}

async function loadImages(query){

const container = document.getElementById("images");

if(!API_KEY || !CX){
showWhatsApp();
return;
}

const url = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(query)}&cx=${CX}&key=${API_KEY}&searchType=image&num=6`;

try{

const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

if(data.items){

data.items.forEach(img=>{
const el = document.createElement("img");
el.src = img.link;
container.appendChild(el);
});

}else{
showWhatsApp();
}

}catch(e){
showWhatsApp();
}

}

function showWhatsApp(){

document.getElementById("images").innerHTML = `
<p>📸 الصور غير متوفرة</p>
<button onclick="sendWhatsApp()">اطلب التقرير الان</button>
`;

}

function sendWhatsApp(){

const phone = "9647812100701";
const msg = `السلام عليكم، اريد فحص سيارة برقم الشاصي: ${currentVIN}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");

}
function resetApp(){

document.getElementById("vin").value = "";
document.getElementById("vin").style.display = "block";

document.getElementById("searchBtn").style.display = "block";
document.getElementById("resetBtn").style.display = "none";

document.getElementById("info").innerHTML = "Waiting...";
document.getElementById("images").innerHTML = "";

currentVIN = "";
}
</script>

</body>
</html>
