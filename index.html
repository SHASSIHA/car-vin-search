<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:15px;
}
input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}
button{
background:#3b82f6;
color:white;
cursor:pointer;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-top:10px;
}
img{
width:100%;
border-radius:10px;
}
.small{font-size:12px;opacity:0.7}
</style>

</head>

<body>

<div class="container">

<h2>🚗 VIN Intelligence System</h2>

<input id="vin" placeholder="Enter VIN number">
<button onclick="searchVIN()">Search</button>

<div class="card" id="info">Waiting...</div>

<div class="card">
<h3>📸 Images</h3>
<div class="grid" id="images"></div>
</div>

</div>

<script>

// =========================
// CONFIG
// =========================
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxmRilWm4Y0WYU9EnTmafJ_7ci1EKMXQ3DTNUA749do_wLN7R3KtqqYzBdGbVO6aCy9/exec";

const API_KEY = ""; // Google CSE (اختياري)
const CX = "";      // اختياري

let currentVIN = "";

// =========================
// MAIN FUNCTION
// =========================
async function searchVIN(){

const vin = document.getElementById("vin").value;
if(!vin) return alert("Enter VIN");

currentVIN = vin;

document.getElementById("info").innerHTML = "Loading...";
document.getElementById("images").innerHTML = "";

// save to sheet instantly
saveToSheet(vin);

// get car data
try{

const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValuesExtended/${vin}?format=json`);
const data = await res.json();
const car = data.Results[0];

document.getElementById("info").innerHTML = `
<h3>🚗 Vehicle Info</h3>
<p><b>Make:</b> ${car.Make || "-"}</p>
<p><b>Model:</b> ${car.Model || "-"}</p>
<p><b>Year:</b> ${car.ModelYear || "-"}</p>
<p class="small">Source: NHTSA</p>
`;

loadImages(`${car.Make} ${car.Model} accident auction damage`);

}catch(e){
document.getElementById("info").innerHTML = "Error loading data";
}

}

// =========================
// SAVE TO GOOGLE SHEET
// =========================
async function saveToSheet(vin){

fetch(SHEET_URL,{
method:"POST",
body:JSON.stringify({
vin:vin,
source:"VIN_APP"
})
});

}

// =========================
// LOAD IMAGES
// =========================
async function loadImages(query){

const container = document.getElementById("images");

if(!API_KEY || !CX){
showWhatsApp();
return;
}

const url = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(query)}&cx=${CX}&key=${API_KEY}&searchType=image&num=6`;

try{

const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

if(data.items && data.items.length>0){

data.items.forEach(img=>{
const el = document.createElement("img");
el.src = img.link;
container.appendChild(el);
});

}else{
showWhatsApp();
}

}catch(e){
showWhatsApp();
}

}

// =========================
// WHATSAPP FALLBACK
// =========================
function showWhatsApp(){

document.getElementById("images").innerHTML = `
<p>❌ No accident images found</p>
<button onclick="sendWhatsApp()">
📲 Request Full Report
</button>
`;

}

// =========================
// WHATSAPP
// =========================
function sendWhatsApp(){

const phone = "9647812100701"; // غيّر رقمك

const msg = `Hello, I need vehicle report for VIN: ${currentVIN}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");

}

</script>

</body>
</html>
