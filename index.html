<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN App</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-top:10px;
}
img{
  width:100%;
  border-radius:10px;
}
.small{opacity:0.7;font-size:12px}
</style>
</head>

<body>

<div class="container">

<h2>🚗 VIN Intelligence App</h2>

<input id="vin" placeholder="Enter VIN number">
<button onclick="searchVIN()">Search</button>

<div class="card" id="info">Enter VIN to start</div>

<div class="card">
<h3>📸 Images</h3>
<div class="grid" id="images"></div>
</div>

</div>

<script>

let currentVin = "";

// =========================
// MAIN FUNCTION
// =========================
async function searchVIN(){

const vin = document.getElementById("vin").value;
if(!vin) return alert("Enter VIN");

currentVin = vin;

document.getElementById("info").innerHTML = "Loading... ⏳";
document.getElementById("images").innerHTML = "";

// =========================
// 1. CAR DATA (NHTSA)
// =========================
try {

const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValuesExtended/${vin}?format=json`);
const data = await res.json();
const car = data.Results[0];

document.getElementById("info").innerHTML = `
<h3>🚗 Vehicle Info</h3>
<p><b>Make:</b> ${car.Make || "-"}</p>
<p><b>Model:</b> ${car.Model || "-"}</p>
<p><b>Year:</b> ${car.ModelYear || "-"}</p>
<p class="small">Source: NHTSA</p>
`;

// =========================
// 2. IMAGE SEARCH (Google CSE)
// =========================
loadImages(`${car.Make} ${car.Model} accident auction damage`);

} catch(e){
document.getElementById("info").innerHTML = "Error loading VIN data";
}

}

// =========================
// 3. IMAGES + FALLBACK
// =========================
async function loadImages(query){

const API_KEY = "YOUR_GOOGLE_API_KEY";
const CX = "YOUR_CX_ID";

const url = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(query)}&cx=${CX}&key=${API_KEY}&searchType=image&num=6`;

const container = document.getElementById("images");
container.innerHTML = "Loading images...";

try {

const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

// إذا صور موجودة
if(data.items && data.items.length > 0){

data.items.forEach(img=>{
const el = document.createElement("img");
el.src = img.link;
container.appendChild(el);
});

}else{

showWhatsAppFallback();

}

} catch(e){
showWhatsAppFallback();
}

}

// =========================
// 4. WHATSAPP FALLBACK
// =========================
function showWhatsAppFallback(){

document.getElementById("images").innerHTML = `
<p>❌ ماكو صور متوفرة</p>
<button onclick="sendWhatsApp()">
📲 إرسال صور الفحص عبر واتساب
</button>
`;

}

// =========================
// 5. WHATSAPP LINK
// =========================
function sendWhatsApp(){

const phone = "9647812100701"; // 👈 غيّر رقمك هنا

const message = `السلام عليكم، أريد فحص سيارة برقم الشاصي: ${currentVin}`;

const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

window.open(url, "_blank");
}

</script>

</body>
</html>
